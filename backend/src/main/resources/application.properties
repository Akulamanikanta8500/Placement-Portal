spring.application.name=PlacementPortal

# Database Setup
spring.datasource.url=jdbc:h2:file:./data/placement_cell;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate Setup
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Secret
jwt.secret=aVeryLongSecretKeyThatIsAtLeast32BytesLongForSecurityReasons
jwt.expiration=86400000

server.port=${PORT:8080}

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
